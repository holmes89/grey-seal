syntax = "proto3";

package schemas.greyseal.v1.services;


import "schemas/greyseal/v1/resource.proto";

service ResourceService {
  // IngestResource ingests a magpie resource, chunks it, and stores embeddings.
  rpc IngestResource(IngestResourceRequest) returns (IngestResourceResponse) {}
  rpc GetResource(GetResourceRequest) returns (GetResourceResponse) {}
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse) {}
  rpc DeleteResource(DeleteResourceRequest) returns (DeleteResourceResponse) {}
}

message IngestResourceRequest {
  schemas.greyseal.v1.Resource data = 1;
}

message IngestResourceResponse {
  schemas.greyseal.v1.Resource data = 1;
}

message GetResourceRequest {
  string uuid = 1;
}

message GetResourceResponse {
  schemas.greyseal.v1.Resource data = 1;
}

message ListResourcesRequest {
  optional int32 count = 1;
  optional string cursor = 2;
}

message ListResourcesResponse {
  repeated schemas.greyseal.v1.Resource data = 1;
  string cursor = 2;
  int32 count = 3;
}

message DeleteResourceRequest {
  string uuid = 1;
}

message DeleteResourceResponse {}
