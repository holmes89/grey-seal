version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - unused
    - deadcode
  exclusions:
    rules:
      - path: lib/schemas/
        linters:
        - errcheck
        - unused
        - staticcheck
        - deadcode
      - path: _test\.go
        linters:
        - errcheck
