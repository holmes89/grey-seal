version: "3.7"
name: greyseal
services:
  api:
    image: ghcr.io/holmes89/greyseal:latest
    restart: always
    build:
      context: ./
      secrets:
        - gh_pat
    environment:
      DATABASE_URL: "postgres://postgres:password@db/greyseal?sslmode=disable"
      QDRANT_HOST: "qdrant:6334"
      QDRANT_COLLECTION: "greyseal"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_EMBED_MODEL: "all-minilm"
      OLLAMA_CHAT_MODEL: "deepseek-r1"
    ports:
      - 9000:9000
    networks:
      - web
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: greyseal
      PGDATA: /var/lib/postgresql/data
    ports:
      - 5432:5432
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d greyseal"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - web

  ollama:
    image: ollama/ollama:latest
    restart: always
    ports:
      - 11434:11434
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - web

  worker:
    image: ghcr.io/holmes89/greyseal-worker:latest
    restart: always
    build:
      context: ./
      dockerfile: Dockerfile.worker
      secrets:
        - gh_pat
    environment:
      DATABASE_URL: "postgres://postgres:password@db/greyseal?sslmode=disable"
      QDRANT_HOST: "qdrant:6334"
      QDRANT_COLLECTION: "greyseal"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_EMBED_MODEL: "all-minilm"
      KAFKA_BROKERS: "redpanda-0:9092"
    networks:
      - web
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
      redpanda-0:
        condition: service_started

  redpanda-0:
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda-0:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda-0:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda-0:33145
      - --advertise-rpc-addr redpanda-0:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
      - --set redpanda.auto_create_topics_enabled=true
      - --set redpanda.default_topic_partitions=1
      - --set redpanda.default_topic_replications=1
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
    container_name: redpanda-0
    volumes:
      - redpanda-0:/var/lib/redpanda/data
    networks:
      - web
    ports:
      - 18081:18081
      - 18082:18082
      - 19092:19092
      - 19644:9644

volumes:
  redpanda-0: null

networks:
  web:

secrets:
  gh_pat:
    file: /home/joel/.gh_pat
